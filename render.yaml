databases:
  - name: encom-radar-db
    plan: free

services:
  - type: web
    name: encom-radar-api
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: encom-radar-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://encom-radar-client.onrender.com
      - key: CRON_SCHEDULE
        value: "0 8 * * *"

  - type: web
    name: encom-radar-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://encom-radar-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
